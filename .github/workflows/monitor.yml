name: 島語訂位監控

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分鐘
  workflow_dispatch:         # 手動觸發

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允許 commit state 回 repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (once)
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python daoyuu_monitor.py --once

      - name: Save state to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor_state.json
          git diff --staged --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push
