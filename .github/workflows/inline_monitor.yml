name: inline.app 訂位監控

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時
  workflow_dispatch:        # 手動觸發

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install playwright requests

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run inline monitor
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python inline_playwright.py

      - name: Save state to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor_state.json
          git diff --staged --quiet || git commit -m "chore: update inline state [skip ci]"
          git pull --rebase origin main
          git push
