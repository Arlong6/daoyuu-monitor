name: 系統心跳檢查

on:
  schedule:
    - cron: '0 9 * * 1'  # 每週一早上 9 點（UTC+8 = 17:00 UTC 前一天，用 UTC 1:00 = 台灣 9:00）
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send heartbeat
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python daoyuu_monitor.py --heartbeat

      - name: Commit timestamp to keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last heartbeat: $(TZ='Asia/Taipei' date)" > last_heartbeat.txt
          git add last_heartbeat.txt
          git commit -m "chore: weekly heartbeat [skip ci]"
          git push
